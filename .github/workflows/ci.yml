name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true

            - name: Sync dependencies
              run: uv sync --locked # requires uv.lock committed; drop --locked if you haven't

            - name: Ruff
              run: uv run ruff check .

            - name: Mypy
              run: uv run mypy .

            - name: Pytest
              # No problems committed yet → pytest collects nothing and exits 5.
              # The `|| code=$?` keeps bash -e from aborting on that exit so we can inspect it.
              # Treat 5 as success for now; once 0217 lands, delete this step and replace with
              #   run: uv run pytest
              # so that "no tests collected" becomes a real failure again.
              run: |
                  code=0
                  uv run pytest || code=$?
                  if [ "$code" -ne 0 ] && [ "$code" -ne 5 ]; then exit "$code"; fi
